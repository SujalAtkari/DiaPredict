<nav class="navbar">
    <div class="navbar-container">
        <div class="navbar-brand">
            <a href="{{ url_for('dashboard') }}" class="brand-link">
                <i class="fas fa-hospital"></i>
                <span class="brand-name">DiaPredict</span>
            </a>
        </div>

        <button class="navbar-toggle" id="navbarToggle" onclick="toggleNavbar()">
            <span></span>
            <span></span>
            <span></span>
        </button>

        <div class="navbar-menu" id="navbarMenu">
            <div class="navbar-items">
                <a href="{{ url_for('dashboard') }}" class="nav-item {% if request.endpoint == 'dashboard' %}active{% endif %}">
                    <i class="fas fa-chart-pie"></i> Dashboard
                </a>
                <a href="{{ url_for('predict') }}" class="nav-item {% if request.endpoint == 'predict' %}active{% endif %}">
                    <i class="fas fa-search"></i> New Test
                </a>
                <a href="{{ url_for('predictions_history') }}" class="nav-item {% if request.endpoint == 'predictions_history' %}active{% endif %}">
                    <i class="fas fa-clipboard-list"></i> History
                </a>
            </div>

            <div class="navbar-user">
                <div class="user-menu">
                    <button class="user-button" onclick="toggleUserMenu()">
                        <i class="fas fa-user-circle"></i>
                        <span class="user-name">{{ current_user.username }}</span>
                        <i class="fas fa-chevron-down dropdown-icon"></i>
                    </button>

                    <div class="user-dropdown" id="userDropdown">
                        <div class="dropdown-item">
                            <i class="fas fa-envelope"></i> {{ current_user.email }}
                        </div>
                        <hr style="margin: 8px 0; border: none; border-top: 1px solid #eee;">
                        <a href="{{ url_for('profile') }}" class="dropdown-item">
                            <i class="fas fa-user"></i> View Profile
                        </a>
                        <a href="{{ url_for('logout') }}" class="dropdown-item logout-item">
                            <i class="fas fa-sign-out-alt"></i> Logout
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</nav>

<script>
    function toggleNavbar() {
        const menu = document.getElementById('navbarMenu');
        menu.classList.toggle('active');
    }

    function toggleUserMenu() {
        const dropdown = document.getElementById('userDropdown');
        dropdown.classList.toggle('active');
    }

    document.addEventListener('click', function(event) {
        const userMenu = document.querySelector('.user-menu');
        if (!userMenu.contains(event.target)) {
            document.getElementById('userDropdown').classList.remove('active');
        }
    });
</script>
