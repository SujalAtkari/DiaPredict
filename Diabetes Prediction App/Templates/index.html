<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Diabetes Prediction</title>
	<style>
		body { font-family: Arial, sans-serif; background: #f5f5f5; margin: 0; }
		.container { max-width: 480px; margin: 40px auto; background: #fff; padding: 24px 28px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
		h1 { text-align: center; margin-bottom: 20px; }
		label { display: block; margin-top: 10px; font-weight: 600; }
		input { width: 100%; padding: 8px 10px; margin-top: 4px; border-radius: 4px; border: 1px solid #ccc; box-sizing: border-box; }
		button { margin-top: 18px; width: 100%; padding: 10px; border: none; border-radius: 4px; background: #1976d2; color: white; font-size: 16px; cursor: pointer; }
		button:hover { background: #135ba3; }
	</style>
	<script>
		function validateForm() {
			const fields = [
				'Pregnancies','Glucose','BloodPressure','SkinThickness',
				'Insulin','BMI','DiabetesPedigreeFunction','Age'
			];
			for (const name of fields) {
				const el = document.forms[0][name];
				if (!el.value.trim()) {
					alert('Please fill in all fields.');
					el.focus();
					return false;
				}
			}
			return true;
		}
	</script>
</head>
<body>
	<div class="container">
		<h1>Diabetes Prediction</h1>
		<form method="post" action="/predict" onsubmit="return validateForm()">
			<label for="Pregnancies">Pregnancies</label>
			<input type="number" name="Pregnancies" step="1" min="0" required />

			<label for="Glucose">Glucose</label>
			<input type="number" name="Glucose" step="0.1" min="0" required />

			<label for="BloodPressure">Blood Pressure</label>
			<input type="number" name="BloodPressure" step="0.1" min="0" required />

			<label for="SkinThickness">Skin Thickness</label>
			<input type="number" name="SkinThickness" step="0.1" min="0" required />

			<label for="Insulin">Insulin</label>
			<input type="number" name="Insulin" step="0.1" min="0" required />

			<label for="BMI">BMI</label>
			<input type="number" name="BMI" step="0.1" min="0" required />

			<label for="DiabetesPedigreeFunction">Diabetes Pedigree Function</label>
			<input type="number" name="DiabetesPedigreeFunction" step="0.001" min="0" required />

			<label for="Age">Age</label>
			<input type="number" name="Age" step="1" min="0" required />

			<button type="submit">Predict</button>
		</form>
	</div>
</body>
</html>
